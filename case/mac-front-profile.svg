<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 260" width="200" height="260">
  <title>Macintosh desk case  front profile (reference)</title>
  <rect width="100%" height="100%" fill="#d4c4a8"/>
  <!-- Monitor body -->
  <rect x="22" y="18" width="156" height="168" rx="18" ry="18" fill="#e8dcc8" stroke="#9a8b72" stroke-width="2"/>
  <!-- Screen recess -->
  <rect x="42" y="38" width="116" height="116" rx="8" fill="#3a3a3a"/>
  <!-- Round display window -->
  <circle cx="100" cy="96" r="34" fill="#1a1a1a" stroke="#6a6a6a" stroke-width="2"/>
  <circle cx="100" cy="96" r="30" fill="#2d2d2d"/>
  <!-- Chin -->
  <rect x="22" y="186" width="156" height="36" rx="6" fill="#e0d4c0" stroke="#9a8b72" stroke-width="2"/>
  <!-- Floppy slot hint -->
  <rect x="68" y="198" width="64" height="10" rx="2" fill="#b8a890"/>
  <text x="100" y="248" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#5a5040">
    Open in Preview  3D: export STL (see README)
  </text>
</svg>
