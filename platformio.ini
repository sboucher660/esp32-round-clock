; ESP32-C3 1.28" round GC9A01 (ESP32-2424S012N/C family)
[env:esp32c3_round]
platform = espressif32@6.5.0
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = 115200
; 921600 often fails mid-flash when USB daemon / hub shares the port — use 460800
upload_speed = 460800

; Port number changes after replug — run: ls /dev/cu.usbmodem*
; upload_port = /dev/cu.usbmodem11401
; If no port: pio run -t upload -e esp32c3_round_jtag

board_build.flash_mode = qio
board_build.f_cpu = 160000000L
board_build.f_flash = 80000000L

lib_deps =
    bodmer/TFT_eSPI@^2.5.43
    bblanchon/ArduinoJson@^7.2.0

build_flags =
    -D USER_SETUP_LOADED=1
    -D GC9A01_DRIVER
    -D TFT_WIDTH=240
    -D TFT_HEIGHT=240
    -D TFT_MOSI=7
    -D TFT_SCLK=6
    -D TFT_CS=10
    -D TFT_DC=2
    -D TFT_RST=-1
    -D TFT_BL=3
    -D TFT_BACKLIGHT_ON=HIGH
    -D TFT_INVERSION_ON
    -D SPI_FREQUENCY=40000000
    -D LOAD_GLCD
    -D LOAD_FONT2
    -D LOAD_FONT4
    -D LOAD_FONT6
    -D LOAD_FONT7
    -D LOAD_FONT8
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1

; Upload via USB-JTAG when CDC serial port is missing (board still runs)
[env:esp32c3_round_jtag]
extends = env:esp32c3_round
upload_protocol = esp-builtin
debug_tool = esp-builtin
