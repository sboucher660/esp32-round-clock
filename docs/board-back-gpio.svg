<?xml version="1.0" encoding="UTF-8"?>
<!-- ESP32-2424S012 back view: USB at bottom, same as your photo -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 520" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#c45c26"/>
    </marker>
  </defs>

  <!-- PCB -->
  <circle cx="210" cy="250" r="185" fill="#e86b1a" stroke="#b84f12" stroke-width="3"/>
  <text x="210" y="248" text-anchor="middle" fill="#fff" font-size="11" opacity="0.35" transform="rotate(-90 210 250)">ESP32-2424S012</text>

  <!-- ESP module (top) -->
  <rect x="118" y="42" width="184" height="72" rx="6" fill="#2a2a2a" stroke="#111" stroke-width="2"/>
  <text x="210" y="78" text-anchor="middle" fill="#ccc" font-size="10">ESP32-C3-MINI</text>
  <text x="210" y="92" text-anchor="middle" fill="#888" font-size="8">(metal shield)</text>

  <!-- USB-C bottom -->
  <rect x="165" y="455" width="90" height="28" rx="4" fill="#555" stroke="#333" stroke-width="2"/>
  <text x="210" y="500" text-anchor="middle" fill="#222" font-size="11" font-weight="600">USB-C (power / flash)</text>

  <!-- Display flex (above USB) -->
  <rect x="95" y="400" width="230" height="22" rx="2" fill="#ff8c00" stroke="#cc6600"/>
  <text x="210" y="395" text-anchor="middle" fill="#333" font-size="9">display ribbon</text>

  <!-- === USABLE FOR EXTRA BUTTON / WIRES === -->

  <!-- P1 4-pin header - bottom left -->
  <g id="p1">
    <rect x="28" y="368" width="52" height="52" rx="4" fill="#d4f4dd" stroke="#2d8a4e" stroke-width="2.5"/>
    <circle cx="44" cy="384" r="5" fill="#2d8a4e"/><text x="44" y="358" text-anchor="middle" font-size="8" fill="#1a5c32">1 GND</text>
    <circle cx="64" cy="384" r="5" fill="#2d8a4e"/><text x="64" y="358" text-anchor="middle" font-size="8" fill="#1a5c32">2 3V3</text>
    <circle cx="44" cy="404" r="5" fill="#1e6bb8"/><text x="44" y="430" text-anchor="middle" font-size="8" fill="#1e6bb8" font-weight="700">3 TX</text>
    <circle cx="64" cy="404" r="5" fill="#1e6bb8"/><text x="64" y="430" text-anchor="middle" font-size="8" fill="#1e6bb8" font-weight="700">4 RX</text>
    <text x="54" y="348" text-anchor="middle" font-size="10" font-weight="700" fill="#1a5c32">P1  best breakout</text>
    <text x="54" y="448" text-anchor="middle" font-size="8" fill="#1e6bb8">GPIO 21 / GPIO 20</text>
  </g>

  <!-- S1 / GPIO8 pads - upper left (often unpopulated) -->
  <g id="s1">
    <rect x="52" y="118" width="36" height="28" rx="3" fill="#d4f4dd" stroke="#2d8a4e" stroke-width="2"/>
    <text x="70" y="136" text-anchor="middle" font-size="8" fill="#1a5c32">S1</text>
    <text x="70" y="108" text-anchor="middle" font-size="9" font-weight="700" fill="#1a5c32">GPIO 8</text>
    <text x="70" y="158" text-anchor="middle" font-size="7" fill="#555">optional pads</text>
  </g>

  <!-- I2C touch pads - free on NO-touch boards -->
  <g id="i2c">
    <rect x="300" y="130" width="70" height="40" rx="3" fill="#e8f0ff" stroke="#4a6fa5" stroke-width="1.5" stroke-dasharray="4 2"/>
    <text x="335" y="148" text-anchor="middle" font-size="8" fill="#4a6fa5">I2C pads</text>
    <text x="335" y="160" text-anchor="middle" font-size="8" fill="#4a6fa5">GPIO 4 / 5</text>
    <text x="335" y="182" text-anchor="middle" font-size="7" fill="#666">(unused on N)</text>
  </g>

  <rect x="300" y="175" width="70" height="22" rx="3" fill="#e8f0ff" stroke="#4a6fa5" stroke-width="1.5" stroke-dasharray="4 2"/>
  <text x="335" y="190" text-anchor="middle" font-size="8" fill="#4a6fa5">GPIO 1 pad</text>

  <!-- === NOT FREE / SPECIAL === -->

  <!-- BOOT top right -->
  <g id="boot">
    <circle cx="318" cy="88" r="14" fill="#fff3cd" stroke="#b8860b" stroke-width="2"/>
    <text x="318" y="92" text-anchor="middle" font-size="8" fill="#7a5a00">BOOT</text>
    <text x="318" y="62" text-anchor="middle" font-size="9" font-weight="700" fill="#7a5a00">GPIO 9</text>
    <text x="318" y="115" text-anchor="middle" font-size="7" fill="#666">pages today</text>
  </g>

  <!-- RST left -->
  <g id="rst">
    <circle cx="48" cy="250" r="14" fill="#f8d7da" stroke="#a94442" stroke-width="2"/>
    <text x="48" y="254" text-anchor="middle" font-size="8" fill="#721c24">RST</text>
    <text x="48" y="228" text-anchor="middle" font-size="8" fill="#721c24">reset only</text>
  </g>

  <!-- Side power key -->
  <g id="pwr">
    <rect x="378" y="218" width="18" height="36" rx="3" fill="#f8d7da" stroke="#a94442" stroke-width="2"/>
    <text x="392" y="210" text-anchor="middle" font-size="8" fill="#721c24" transform="rotate(90 392 210)">POWER</text>
    <text x="355" y="238" text-anchor="end" font-size="8" fill="#721c24">battery KEY</text>
    <text x="355" y="252" text-anchor="end" font-size="7" fill="#666">not GPIO</text>
  </g>

  <!-- BAT+ -->
  <rect x="330" y="168" width="28" height="18" rx="2" fill="#fff" stroke="#999" stroke-width="1.5"/>
  <text x="344" y="162" text-anchor="middle" font-size="8" fill="#333">BAT+</text>
  <text x="344" y="198" text-anchor="middle" font-size="7" fill="#666">3.7V cell</text>

  <!-- Legend -->
  <rect x="20" y="18" width="380" height="88" rx="8" fill="#fafafa" stroke="#ccc"/>
  <text x="30" y="38" font-size="12" font-weight="700" fill="#222">Back of board (USB toward you)  free GPIO for an extra button</text>
  <rect x="30" y="48" width="14" height="14" fill="#d4f4dd" stroke="#2d8a4e"/><text x="50" y="59" font-size="10" fill="#333">Green = solder here (GPIO 8, 20, 21, or 1/4/5 on no-touch)</text>
  <rect x="30" y="68" width="14" height="14" fill="#fff3cd" stroke="#b8860b"/><text x="50" y="79" font-size="10" fill="#333">Yellow = BOOT GPIO 9 (already used in firmware)</text>
  <rect x="30" y="88" width="14" height="14" fill="#f8d7da" stroke="#a94442"/><text x="50" y="99" font-size="10" fill="#333">Red = reset / battery power  not programmable</text>

  <!-- Callout: wiring tip -->
  <path d="M 90 320 L 90 360" stroke="#c45c26" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="95" y="310" font-size="9" fill="#c45c26">Wire switch:</text>
  <text x="95" y="322" font-size="9" fill="#c45c26">GPIO � switch � GND</text>
</svg>
